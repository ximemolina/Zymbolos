name: Código Bonis - Formateo con Black

on:
  push:
    branches:
      - '**'
      
permissions:
  contents: write
  
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Black
        run: pip install black

      - name: Formatear con Black
        run: black .

      - name: Commit cambios
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: aplicar formato con Black'
